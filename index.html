<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whiteboard Studio | Animación Estilo VideoScribe</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar de Controles -->
        <aside class="sidebar">
            <div class="logo">
                <span class="icon">✏️</span>
                <h1>Whiteboard<span>Studio</span></h1>
            </div>

            <div class="sidebar-scroll">
                <div class="control-group">
                    <h3>Añadir Elementos</h3>
                    <div class="asset-grid">
                        <button class="asset-btn" data-type="text" title="Añadir Texto">
                            <span>T</span>
                            <small>Texto</small>
                        </button>
                        <button class="asset-btn" data-type="svg" data-shape="circle" title="Añadir Círculo">
                            <svg viewBox="0 0 100 100" width="24"><circle cx="50" cy="50" r="40" fill="none" stroke="currentColor" stroke-width="4"/></svg>
                            <small>Círculo</small>
                        </button>
                        <button class="asset-btn" data-type="svg" data-shape="square" title="Añadir Cuadrado">
                            <svg viewBox="0 0 100 100" width="24"><rect x="10" y="10" width="80" height="80" fill="none" stroke="currentColor" stroke-width="4"/></svg>
                            <small>Cuadrado</small>
                        </button>
                        <button class="asset-btn" data-type="svg" data-shape="star" title="Añadir Estrella">
                            <svg viewBox="0 0 100 100" width="24"><path d="M50 10L61 40H93L67 60L77 90L50 70L23 90L33 60L7 40H39L50 10Z" fill="none" stroke="currentColor" stroke-width="4"/></svg>
                            <small>Estrella</small>
                        </button>
                        <button class="asset-btn" data-type="upload" title="Cargar Imagen">
                            <span>🖼️</span>
                            <small>Imagen</small>
                        </button>
                        <input type="file" id="image-upload" accept="image/*" style="display: none;">
                    </div>
                </div>

                <div class="control-group">
                    <h3>Ajustes de Animación</h3>
                    <label for="speed">Velocidad de la Mano</label>
                    <input type="range" id="speed" min="0.5" max="10" step="0.5" value="3">
                    
                    <label for="hand-size">Tamaño de la Mano</label>
                    <input type="range" id="hand-size" min="200" max="600" step="10" value="350">
                </div>
            </div>

            <div class="actions">
                <button id="play-btn" class="btn-primary">▶ Reproducir Todo</button>
                <button id="export-btn" class="btn-export" style="background: var(--primary); color: white;">📹 EXPORTAR MP4</button>
                <button id="clear-btn" class="btn-secondary">🗑 Limpiar Diapositiva</button>
            </div>
        </aside>

        <!-- Área Principal de Dibujo -->
        <main class="main-content">
            <div id="export-overlay" class="export-overlay" style="display: none;">
                <div class="export-status">
                    <div class="spinner"></div>
                    <p>Generando Video...</p>
                    <small>Por favor, no cierres la pestaña</small>
                </div>
            </div>
            <div class="canvas-area">
                <div id="whiteboard" class="whiteboard">
                    <!-- Los elementos SVG se inyectarán aquí -->
                    <svg id="main-svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid meet">
                        <!-- Aquí se dibujarán los paths -->
                    </svg>
                    
                    <!-- La mano que "escribe" (SIEMPRE AL FINAL PARA ESTAR ENCIMA) -->
                    <div id="drawing-hand" class="drawing-hand">
                        <img src="hand.png" alt="Mano escribiendo">
                    </div>

                    <!-- Canvas oculto para grabación -->
                    <canvas id="recording-canvas" width="1920" height="1080" style="display: none;"></canvas>
                </div>
            </div>

            <!-- Barra de Diapositivas -->
            <div class="slides-bar">
                <div class="slides-container" id="slides-container">
                    <!-- Thumbnails de diapositivas -->
                </div>
                <button id="add-slide-btn" class="add-slide-btn">+ Añadir Diapositiva</button>
            </div>
        </main>
    </div>

    <!-- Modal para Texto -->
    <div id="text-modal" class="modal">
        <div class="modal-content">
            <h2>Escribe tu mensaje</h2>
            <input type="text" id="text-input" placeholder="Hola Mundo..." maxlength="30">
            <div class="modal-actions">
                <button id="cancel-text" class="btn-secondary">Cancelar</button>
                <button id="add-text-confirm" class="btn-primary">Añadir al Lienzo</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
